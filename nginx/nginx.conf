# Reverse proxy: single public entrypoint.
#   /api, /docs, /redoc, /openapi.json, /health  -> backend (FastAPI)
#   everything else                              -> frontend (SPA)

upstream backend {
    server backend:8000;
}
upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Allow CSV/XLSX uploads through the proxy.
    client_max_body_size 10m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://backend;
    }

    location ~ ^/(docs|redoc|openapi\.json|health)$ {
        proxy_pass http://backend;
    }

    location / {
        proxy_pass http://frontend;
    }
}
