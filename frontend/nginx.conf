# Frontend container: serve the built SPA with history-API fallback.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
